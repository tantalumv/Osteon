name: Documentation

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Natural Docs (Native Linux x64)
        run: |
          curl -L -A "Mozilla/5.0" "https://www.naturaldocs.org/download/natural_docs/2.4/Natural_Docs_2.4_Development_Release_2.Linux.x64.zip" -o nd.zip
          unzip nd.zip -d natural_docs_bin
          chmod +x "natural_docs_bin/Natural Docs/NaturalDocs"

      - name: Generate API Docs (Natural Docs)
        run: |
          mkdir -p site_output
          ./"natural_docs_bin/Natural Docs/NaturalDocs" -i src -o HTML site_output -p tools/natural_docs/nd_config -v

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site_output'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
