name: Documentation

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Download Natural Docs
        run: |
          # Download the cross-platform version of Natural Docs 2.3.1
          curl -L "https://www.naturaldocs.org/download/natural_docs/2.3.1/Natural_Docs_2.3.1.zip" -o nd.zip
          unzip nd.zip -d natural_docs_bin

      - name: Generate Documentation
        run: |
          # Use dotnet to run the cross-platform NaturalDocs.dll
          dotnet natural_docs_bin/NaturalDocs.dll -i . -o HTML nd_output -p nd_config

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'nd_output'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
