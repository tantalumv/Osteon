name: Documentation

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install MkDocs Dependencies
        run: |
          pip install mkdocs mkdocs-terminal mkdocs-awesome-nav

      - name: Download Natural Docs (Native Linux x64)
        run: |
          # Download the high-performance native binary (no Mono/Dotnet needed)
          curl -L -A "Mozilla/5.0" "https://www.naturaldocs.org/download/natural_docs/2.4/Natural_Docs_2.4_Development_Release_2.Linux.x64.zip" -o nd.zip
          unzip nd.zip -d natural_docs_bin
          chmod +x natural_docs_bin/NaturalDocs

      - name: Generate API Docs (Natural Docs)
        run: |
          mkdir -p docs/api
          # Run the native binary directly
          ./natural_docs_bin/NaturalDocs -i . -o HTML docs/api -p tools/natural_docs/nd_config

      - name: Build MkDocs Site
        run: |
          mkdir -p docs
          cp README.md docs/index.md
          # Copy extra markdown files if they exist
          find docs/*.md -maxdepth 0 -exec cp {} docs/ \; 2>/dev/null || true
          # Build the final site
          mkdocs build -d site_output

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site_output'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
