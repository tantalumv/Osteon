name: Documentation

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install MkDocs Dependencies
        run: |
          pip install mkdocs mkdocs-terminal mkdocs-awesome-nav

      - name: Download Natural Docs
        run: |
          # Download the stable cross-platform version
          curl -L "https://www.naturaldocs.org/download/natural_docs/2.3.1/Natural_Docs_2.3.1.zip" -o nd.zip
          unzip nd.zip -d natural_docs_bin

      - name: Generate API Docs (Natural Docs)
        run: |
          mkdir -p docs/api
          # Find the entry point (DLL or EXE) case-insensitively
          ND_PATH=$(find natural_docs_bin -maxdepth 5 -iname "NaturalDocs.dll" -o -iname "NaturalDocs.exe" | head -n 1)
          
          if [ -z "$ND_PATH" ]; then
            echo "ERROR: Could not find NaturalDocs.dll or NaturalDocs.exe in natural_docs_bin/"
            ls -R natural_docs_bin
            exit 1
          fi
          
          echo "Found entry point at: $ND_PATH"
          # Execute using dotnet
          dotnet "$ND_PATH" -i . -o HTML docs/api -p nd_config

      - name: Build MkDocs Site
        run: |
          mkdir -p docs
          cp README.md docs/index.md
          # Copy extra markdown files if they exist
          find docs/*.md -maxdepth 0 -exec cp {} docs/ \; 2>/dev/null || true
          # Build the final site
          mkdocs build -d site_output

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site_output'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
