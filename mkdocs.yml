site_name: Osteon Compiler
site_description: Documentation for the Osteon compiler
site_url: https://tantalumv.github.io/Osteon/
repo_url: https://github.com/tantalumv/Osteon
repo_name: tantalumv/Osteon

docs_dir: docs/docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

nav:
  - Home: index.md
  - Modules:
    - Main: modules/main.md
    - Lexer: modules/lexer.md
    - Parser: modules/parser.md
    - AST: modules/ast.md
    - Errors: modules/error.md
    - x86_64: modules/x86_64.md
    - PE32+: modules/pe32.md
    - COFF: modules/coff.md
    - Desugar: modules/desugar.md
    - Const Eval: modules/const_eval.md
    - Layout: modules/layout.md
    - Width: modules/width.md
    - ModR/M: modules/modrm.md
    - Namespace: modules/namespace.md
    - Import: modules/import.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true
